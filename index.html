<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F6E56" />
    <title>FPV Campo · F.P. Vieira Engenharia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              fpv: {
                50: '#E3F0EB',
                100: '#C6E1D7',
                300: '#5FA98F',
                500: '#0F6E56',
                600: '#0C5A47',
                700: '#094537',
                900: '#073D30'
              }
            }
          }
        }
      }
    </script>
    <style>
      body { background-color: #F4F6F3; }
      @media print {
        body * { visibility: hidden; }
        #folha-print, #folha-print * { visibility: visible; }
        #folha-print { position: absolute; top: 0; left: 0; width: 100%; }
        .print-hidden { display: none !important; }
        .folha { break-after: page; page-break-after: always; }
        * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
